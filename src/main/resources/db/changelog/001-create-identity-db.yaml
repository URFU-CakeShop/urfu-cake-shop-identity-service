databaseChangeLog:
  - changeSet:
      id: 001-create-identity-db
      author: Artamonov Vyacheslav
      preConditions:
        - not:
            sqlCheck:
              expectedResult: "1"
              sql: "SELECT 1 FROM pg_database WHERE datname='identity_db';"
      changes:
        - sql:
            sql: |
              CREATE DATABASE identity_db;
      failOnError: false