databaseChangeLog:
  - changeSet:
      id: 003-insert-roles
      author: Artamonov Vyacheslav
      preConditions:
        - onFail: MARK_RAN
        - tableIsEmpty:
            tableName: roles
      changes:
        - insert:
            tableName: roles
            columns:
              - column:
                  name: id
                  valueComputed: "gen_random_uuid()"
              - column:
                  name: role
                  value: "USER"
        - insert:
            tableName: roles
            columns:
              - column:
                  name: id
                  valueComputed: "gen_random_uuid()"
              - column:
                  name: role
                  value: "ADMIN"